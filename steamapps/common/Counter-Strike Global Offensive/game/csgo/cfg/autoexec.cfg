alias "f6_cycle" "f6_say_glhf"
bind "F6" "f6_cycle"

alias "f7_say_commend" "say 但我更喜欢赞美，这对我很重要，能给我3个赞美吗？按住键盘TAB，点我的头像，找到并点击微笑。; alias f7_cycle f7_say_instructions"
